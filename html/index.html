<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Gaming Platform</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial; background: #0a0a1a; color: #fff; }
  .header { background:#1a1a3e; padding:20px; text-align:center; }
  .header h1 { font-size:2em; color:#7c7cff; }
  .games-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px; padding:30px;
  }
  .game-card {
    background:#1a1a3e; border-radius:12px;
    cursor:pointer; transition:transform 0.2s;
    border:1px solid #3a3a8a;
  }
  .game-card:hover { transform:scale(1.05); }
  .game-card img { width:100%; height:150px; object-fit:cover; }
  .game-info { padding:12px; }
  .game-info h3 { color:#7c7cff; margin-bottom:5px; }
  .play-btn {
    background:#3a3a8a; color:white; border:none;
    padding:8px 20px; border-radius:6px;
    cursor:pointer; width:100%; margin-top:8px;
  }
  .play-btn:hover { background:#5a5aaa; }
  #emu-wrap {
    display:none; position:fixed; top:0; left:0;
    width:100%; height:100%; background:rgba(0,0,0,0.95);
    z-index:1000; align-items:center; justify-content:center;
    flex-direction:column;
  }
  #emu-wrap.active { display:flex; }
  #close-btn {
    position:absolute; top:20px; right:20px;
    background:#ff4444; color:white; border:none;
    padding:10px 20px; border-radius:8px; cursor:pointer;
  }
</style>
</head>
<body>
<div class="header">
  <h1>Cloud Gaming Platform</h1>
  <p>العب ألعابك المفضلة مجاناً</p>
</div>
<div class="games-grid" id="grid"></div>
<div id="emu-wrap">
  <button id="close-btn" onclick="closeGame()">X إغلاق</button>
  <div id="player" style="width:90%;max-width:900px;height:80vh;"></div>
</div>
<script>
const games = [
  {name:"Super Mario World", sys:"snes", rom:"roms/mario.sfc", cover:"assets/mario.jpg"},
  {name:"Pokemon Fire Red", sys:"gba", rom:"roms/pokemon.gba", cover:"assets/pokemon.jpg"},
  {name:"Sonic the Hedgehog", sys:"segaMD", rom:"roms/sonic.md", cover:"assets/sonic.jpg"},
];
const grid = document.getElementById('grid');
games.forEach((g,i)=>{
  grid.innerHTML += `<div class="game-card">
    <img src="${g.cover}" onerror="this.src='assets/default.jpg'">
    <div class="game-info">
      <h3>${g.name}</h3>
      <p style="color:#aaa;font-size:12px">${g.sys.toUpperCase()}</p>
      <button class="play-btn" onclick="play(${i})">العب الآن</button>
    </div></div>`;
});
function play(i){
  const g=games[i];
  document.getElementById('emu-wrap').className='active';
  document.getElementById('player').innerHTML=`
    <div id="game" style="width:100%;height:100%"></div>
    <script>
      EJS_player='#game';
      EJS_core='${g.sys}';
      EJS_gameUrl='${g.rom}';
      EJS_pathtodata='/emulatorjs/';
    <\/script>
    <script src="/emulatorjs/loader.js"><\/script>`;
}
function closeGame(){
  document.getElementById('emu-wrap').className='';
  document.getElementById('player').innerHTML='';
}
</script>
</body>
</html>
